<h2>登録情報の確認・変更</h2>
<form>
	<label>ユーザー名
		<i role="button" class="help ri-question-line">
			変更不可。<br>
			基本的にキャラクターからユーザー名が見えることはありません。
		</i>
		<input type="text" name="id" disabled>
	</label>
	<label>プロフィール
		<i role="button" class="help ri-question-line">
			参加したゲームとその時のキャラクターなどを記録すると良いと思います。<br>
			文字装飾・レイアウト装飾が可能です。詳しい記法は<a>こちら</a>を確認してください。
		</i>
		<textarea name="profile"></textarea>
	</label>
	<label>ウェブフックURL
		<i role="button" class="help ri-question-line">
			ポータル経由でキャラクターを登録した際、自動的にこのURLがウェブフックに設定される場合があります。<br>
			ここでの設定とは別に、ゲーム側にもウェブフックURLを設定する場所があると思います（なのでゲームごとに別のものを使うことも可能です）。<br>
			また、おそらく無いとは思いますが、ポータルから通知を飛ばす際にも使用されます。
		</i>
		<input type="url" name="webhook">
	</label>
	<label hidden>ユーザーミュート
		<i role="button" class="help ri-question-line">
			未実装。正直実装する気もあまりありません。
		</i>
	</label>
</form>
