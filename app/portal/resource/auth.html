<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta charset="utf-8">
		<title>Authorize</title>
		<script>
			const code = '{{code|default:""}}';
			if (code !== '') {
				if (window.opener && !window.opener.closed) window.opener.postMessage({ type: 'portal_auth_code', code: code }, '*');
				window.close();
			}
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
		<meta name="robots" content="none">
		<meta name="viewport" content="width=device-width,viewport-fit=cover">
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.min.css">
		<base href="/">
		<script type="module">
			import { Ajax } from '/common/script/ajax.js';
			document.getElementById('login').addEventListener('submit', ev => {
				ev.preventDefault();
				const form = ev.currentTarget;
				new Ajax(form).send().then(() => {
					location.reload();
				});
			})
		</script>
	</head>
	<body>
		<form id="login" action="entry" method="post" data-encode="form">
			<label><i class="ri-user-4-fill"></i><input type="text" name="name" placeholder="ユーザー名"></label>
			<label><i class="ri-key-2-fill"></i><input type="password" name="password" placeholder="パスワード"></label>
			<button type="submit">ログイン</button>
		</form>
		<p>または<a href="entry?popup"></a></p>
	</body>
</html>
