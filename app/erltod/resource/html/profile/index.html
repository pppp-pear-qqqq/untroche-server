<h2>キャラクター情報</h2>
<form>
	<label>名前
		<i role="button" class="help ri-question-line">
		</i>
		<input type="text" name="name" maxlength="30" minlength="1">
	</label>
	<label>1行コメント
		<i role="button" class="help ri-question-line">
			キャラクターリストで表示されるコメントです。
		</i>
		<input type="text" name="comment" maxlength="30">
	</label>
	<label>プロフィール
		<i role="button" class="help ri-question-line">
		</i>
		<textarea name="profile" maxlength="4000"></textarea>
	</label>
	<label>プロフィール画像
		<i role="button" class="help ri-question-line">
			改行区切りで複数設定可能。
		</i>
		<textarea name="profile" maxlength="2000"></textarea>
	</label>
	<label>アイコン画像
		<i role="button" class="help ri-question-line">
			改行区切りで複数設定可能。最初のアイコンがキャラクターリストなどで表示されます。
		</i>
		<textarea name="profile" maxlength="2000"></textarea>
	</label>
</form>
